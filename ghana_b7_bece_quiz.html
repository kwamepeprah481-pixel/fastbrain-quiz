<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f6fa;--surface:#ffffff;--card:#ffffff;--border:#e2e5ef;--border2:#c8cde0;
  --text:#1a1d2e;--muted:#6b7280;--faint:#9ca3af;
  --accent:#1a56db;--accent-bg:#eff4ff;--accent-light:#dbeafe;
  --success:#0a7c4b;--success-bg:#ecfdf5;--success-border:#a7f3d0;
  --danger:#c0392b;--danger-bg:#fff5f5;--danger-border:#fca5a5;
  --warn:#b45309;--warn-bg:#fffbeb;
  --ghana-gold:#f59e0b;--ghana-red:#dc2626;--ghana-green:#16a34a;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --shadow-sm:0 1px 2px rgba(0,0,0,.06);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
.app{max-width:760px;margin:0 auto;padding:1.5rem 1.25rem 4rem;}

/* header */
.header{display:flex;align-items:center;gap:12px;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1.5px solid var(--border);}
.logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--ghana-green),var(--accent));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.header h1{font-family:'Nunito',sans-serif;font-size:20px;font-weight:800;color:var(--text);}
.header p{font-size:12px;color:var(--muted);margin-top:1px;}
.gh-flag{display:flex;height:6px;width:40px;border-radius:3px;overflow:hidden;}
.gh-flag div{flex:1;}
.flag-r{background:var(--ghana-red);}
.flag-g{background:var(--ghana-gold);}
.flag-gr{background:var(--ghana-green);}

/* screens */
.screen{display:none;}.screen.active{display:block;}

/* subject cards */
.page-title{font-family:'Nunito',sans-serif;font-size:26px;font-weight:800;color:var(--text);margin-bottom:4px;}
.page-sub{font-size:14px;color:var(--muted);margin-bottom:1.5rem;}
.subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.subject-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:1.25rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.subject-card:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-2px);}
.subject-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.subject-card.eng::after{background:linear-gradient(90deg,#6366f1,#8b5cf6);}
.subject-card.sci::after{background:linear-gradient(90deg,#0ea5e9,#06b6d4);}
.subject-card.math::after{background:linear-gradient(90deg,#f59e0b,#f97316);}
.subject-card.soc::after{background:linear-gradient(90deg,#16a34a,#10b981);}
.subject-card.comp::after{background:linear-gradient(90deg,#dc2626,#f43f5e);}
.subj-icon{font-size:28px;margin-bottom:8px;}
.subject-card h3{font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;margin-bottom:3px;}
.subject-card p{font-size:12px;color:var(--muted);line-height:1.4;}
.quiz-count-badge{display:inline-block;margin-top:8px;font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 10px;color:var(--muted);font-weight:500;}

/* quiz list */
.back-btn{background:none;border:1.5px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer;margin-bottom:1.5rem;transition:all .2s;font-weight:500;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.quiz-item{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:9px;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-sm);}
.quiz-item:hover{border-color:var(--accent);box-shadow:var(--shadow);}
.qi-info h4{font-weight:600;font-size:14px;margin-bottom:3px;}
.qi-info p{font-size:12px;color:var(--muted);}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;}
.badge-easy{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;}
.badge-medium{background:#fffbeb;color:#92400e;border:1px solid #fcd34d;}
.badge-hard{background:#fff5f5;color:#991b1b;border:1px solid #fca5a5;}
.arrow-ic{color:var(--faint);font-size:20px;font-weight:300;}

/* quiz screen */
.quiz-topbar{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;}
.q-progress-wrap{flex:1;}
.q-progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500;}
.progress-track{height:6px;background:var(--border);border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#6366f1);border-radius:10px;transition:width .4s ease;}
.score-pill{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:5px 14px;font-size:13px;font-weight:600;white-space:nowrap;box-shadow:var(--shadow-sm);}
.score-pill span{color:var(--accent);}

/* timer */
.timer-wrap{position:relative;width:52px;height:52px;flex-shrink:0;}
.timer-wrap svg{transform:rotate(-90deg);}
.timer-bg{fill:none;stroke:var(--border);stroke-width:4.5;}
.timer-fg{fill:none;stroke-width:4.5;stroke-linecap:round;transition:stroke-dashoffset .9s linear,stroke .3s;}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;}

/* question */
.question-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem;box-shadow:var(--shadow-sm);}
.q-num-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;}
.q-text{font-family:'Nunito',sans-serif;font-size:18px;font-weight:700;line-height:1.5;color:var(--text);}

.options-grid{display:grid;gap:9px;}
.option-btn{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:.85rem 1.1rem;text-align:left;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:12px;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);width:100%;box-shadow:var(--shadow-sm);}
.option-btn:hover:not(:disabled){border-color:var(--accent);background:var(--accent-bg);}
.option-letter{width:28px;height:28px;border-radius:8px;background:var(--bg);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;transition:all .18s;}
.option-btn.correct{border-color:var(--success);background:var(--success-bg);}
.option-btn.correct .option-letter{background:var(--success);border-color:var(--success);color:#fff;}
.option-btn.wrong{border-color:var(--danger);background:var(--danger-bg);}
.option-btn.wrong .option-letter{background:var(--danger);border-color:var(--danger);color:#fff;}

.feedback-row{min-height:38px;display:flex;align-items:center;margin:6px 0;}
.fb{font-size:13px;font-weight:600;padding:6px 14px;border-radius:8px;display:inline-flex;align-items:center;gap:6px;}
.fb.correct{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border);}
.fb.wrong{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border);}
.fb.timeout{background:var(--warn-bg);color:var(--warn);border:1px solid #fcd34d;}

.next-btn{width:100%;background:var(--accent);border:none;border-radius:12px;padding:13px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:#fff;cursor:pointer;transition:all .2s;margin-top:4px;}
.next-btn:hover{background:#1644bb;transform:translateY(-1px);}
.next-btn:disabled{background:var(--border);color:var(--faint);cursor:not-allowed;transform:none;}

/* results */
.results-hero{text-align:center;padding:1.5rem 0 1rem;}
.score-circle{width:130px;height:130px;margin:0 auto 1.25rem;position:relative;}
.score-circle svg{transform:rotate(-90deg);}
.score-circle-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-big{font-family:'Nunito',sans-serif;font-size:30px;font-weight:800;}
.score-sm{font-size:11px;color:var(--muted);font-weight:500;}
.results-title{font-family:'Nunito',sans-serif;font-size:24px;font-weight:800;margin-bottom:5px;}
.results-sub{color:var(--muted);font-size:14px;}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:1.25rem 0;}
.stat-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:.9rem;text-align:center;box-shadow:var(--shadow-sm);}
.stat-val{font-family:'Nunito',sans-serif;font-size:26px;font-weight:800;margin-bottom:3px;}
.stat-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px;}
.stat-card.g .stat-val{color:var(--success);}
.stat-card.r .stat-val{color:var(--danger);}
.stat-card.b .stat-val{color:var(--accent);}

.result-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;}
.btn-outline{background:none;border:1.5px solid var(--border);border-radius:12px;padding:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text);cursor:pointer;transition:all .2s;}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-primary{background:var(--accent);border:none;border-radius:12px;padding:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:#fff;cursor:pointer;transition:all .2s;}
.btn-primary:hover{background:#1644bb;}

/* review */
.review-heading{font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;margin-bottom:1rem;padding-top:.5rem;border-top:1.5px solid var(--border);}
.rev-item{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:1rem 1.1rem;margin-bottom:9px;box-shadow:var(--shadow-sm);}
.rev-item.cq{border-left:4px solid var(--success);}
.rev-item.wq{border-left:4px solid var(--danger);}
.rev-item.sq{border-left:4px solid var(--ghana-gold);}
.rev-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
.rev-q{font-size:13px;font-weight:500;line-height:1.5;flex:1;}
.rev-badge{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.rb-c{background:var(--success-bg);color:var(--success);}
.rb-w{background:var(--danger-bg);color:var(--danger);}
.rb-s{background:var(--warn-bg);color:var(--warn);}
.rev-ans{font-size:12px;color:var(--muted);}
.rev-ans .ca{color:var(--success);font-weight:600;}
.rev-ans .wa{color:var(--danger);font-weight:600;}

.home-btn{width:100%;background:none;border:1.5px solid var(--border);border-radius:12px;padding:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;margin-top:.5rem;}
.home-btn:hover{border-color:var(--text);color:var(--text);}
@keyframes pop{0%{transform:scale(.92);opacity:0}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .22s ease forwards;}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo">🇬🇭</div>
    <div>
      <h1>JHS QuizMaster</h1>
      <p>NaCCA Common Core Programme · BECE-Style Objective Questions</p>
    </div>
    <div style="margin-left:auto;display:flex;flex-direction:column;gap:3px;align-items:center;">
      <div class="gh-flag"><div class="flag-r"></div><div class="flag-g"></div><div class="flag-gr"></div></div>
      <span style="font-size:10px;color:var(--faint);">Ghana</span>
    </div>
  </header>

  <!-- SCREEN 1: Subjects -->
  <div class="screen active" id="screen-subjects">
    <p class="page-title">Select a Subject</p>
    <p class="page-sub">NaCCA Common Core Programme · 40 questions per quiz</p>
    <div class="subject-grid" id="subject-grid"></div>
  </div>

  <!-- SCREEN 2: Quiz List -->
  <div class="screen" id="screen-quizlist">
    <button class="back-btn" onclick="goBack('subjects')">← All Subjects</button>
    <p class="page-title" id="ql-heading"></p>
    <p class="page-sub" id="ql-sub"></p>
    <div id="quiz-list"></div>
  </div>

  <!-- SCREEN 3: Quiz -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-topbar">
      <div class="timer-wrap">
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle class="timer-bg" cx="26" cy="26" r="22"/>
          <circle class="timer-fg" id="timer-ring" cx="26" cy="26" r="22"/>
        </svg>
        <div class="timer-num" id="timer-num">40</div>
      </div>
      <div class="q-progress-wrap">
        <div class="q-progress-label">
          <span id="q-counter">Question 1 of 40</span>
          <span id="q-subj-tag"></span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      </div>
      <div class="score-pill">Score: <span id="live-score">0</span></div>
    </div>
    <div class="question-card pop" id="q-card">
      <p class="q-num-label" id="q-num-label">QUESTION 1</p>
      <p class="q-text" id="q-text">Loading...</p>
    </div>
    <div class="options-grid" id="options-grid"></div>
    <div class="feedback-row"><div class="fb" id="feedback-msg" style="display:none"></div></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()" disabled>Next Question →</button>
  </div>

  <!-- SCREEN 4: Results -->
  <div class="screen" id="screen-results">
    <div class="results-hero">
      <div class="score-circle">
        <svg width="130" height="130" viewBox="0 0 130 130">
          <circle fill="none" stroke="#e2e5ef" stroke-width="10" cx="65" cy="65" r="55"/>
          <circle fill="none" stroke-width="10" stroke-linecap="round" cx="65" cy="65" r="55" id="result-ring"
            stroke-dasharray="345.4" stroke-dashoffset="345.4" style="transition:stroke-dashoffset 1.3s ease"/>
        </svg>
        <div class="score-circle-inner"><span class="score-big" id="result-pct">0%</span><span class="score-sm">score</span></div>
      </div>
      <p class="results-title" id="result-title">Well done!</p>
      <p class="results-sub" id="result-sub"></p>
    </div>
    <div class="stats-row">
      <div class="stat-card g"><div class="stat-val" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
      <div class="stat-card r"><div class="stat-val" id="stat-wrong">0</div><div class="stat-label">Wrong</div></div>
      <div class="stat-card b"><div class="stat-val" id="stat-skip">0</div><div class="stat-label">Skipped</div></div>
    </div>
    <div class="result-actions">
      <button class="btn-outline" onclick="retryQuiz()">🔄 Retry Quiz</button>
      <button class="btn-primary" onclick="toggleReview()">📋 Review Answers</button>
    </div>
    <div id="review-section" style="display:none">
      <p class="review-heading">Answer Review</p>
      <div id="review-list"></div>
    </div>
    <button class="home-btn" onclick="goHome()">← Back to Subjects</button>
  </div>
</div>

<script>
const CIRC = 2*Math.PI*22;
const TMAX = 40;

const DATA = {
  subjects:[
    {id:'eng',name:'English Language',icon:'📖',desc:'Grammar, Comprehension & Literature',cls:'eng',quizzes:['e1','e2']},
    {id:'sci',name:'Integrated Science',icon:'🔬',desc:'Biology, Chemistry & Physics',cls:'sci',quizzes:['s1','s2']},
    {id:'math',name:'Mathematics',icon:'📐',desc:'Number, Algebra & Geometry',cls:'math',quizzes:['m1','m2']},
    {id:'soc',name:'Social Studies',icon:'🌍',desc:'Environment, Society & Ghana',cls:'soc',quizzes:['so1','so2']},
    {id:'comp',name:'Computing',icon:'💻',desc:'ICT, Hardware & Word Processing',cls:'comp',quizzes:['c1','c2']},
  ],
  quizzes:{
    e1:{id:'e1',title:'English Language — Set A',desc:'40 questions · Lexis & Structure, Grammar',difficulty:'medium',subj:'English Language',qs:[
      {q:'Which of the following words contains the vowel sound /ɪ/ as in "sit"?',o:['seat','bit','beat','boot'],a:1},
      {q:'Choose the correct sentence: "Each of the boys ___ present."',o:['were','are','is','have been'],a:2},
      {q:'The word "beautiful" is a(n):',o:['noun','adverb','adjective','pronoun'],a:2},
      {q:'Which punctuation mark is used to end a question?',o:['Full stop','Comma','Question mark','Exclamation mark'],a:2},
      {q:'Identify the noun in the sentence: "The tall man walked slowly."',o:['tall','walked','slowly','man'],a:3},
      {q:'"He ran very quickly." The underlined word "quickly" is a(n):',o:['adjective','verb','adverb','noun'],a:2},
      {q:'Which of the following is a conjunction?',o:['because','quickly','beautiful','table'],a:0},
      {q:'The plural of "ox" is:',o:['oxes','oxen','oxs','ox'],a:1},
      {q:'Choose the correct tag question: "He plays football, ___?"',o:["doesn't he","don't he","isn't he","wasn't he"],a:0},
      {q:'Which sentence is in the past tense?',o:['She writes a letter.','She will write a letter.','She wrote a letter.','She is writing a letter.'],a:2},
      {q:'"They ___ watching TV when I arrived." Choose the correct tense form.',o:['were','are','is','was'],a:0},
      {q:'Which of these is a preposition?',o:['run','under','happy','sing'],a:1},
      {q:'Select the antonym of "ancient":',o:['old','historical','modern','past'],a:2},
      {q:'The synonym of "enormous" is:',o:['tiny','huge','short','thin'],a:1},
      {q:'Which sentence uses the passive voice?',o:['The dog bit the boy.','The boy was bitten by the dog.','The boy bit the dog.','A dog is biting the boy.'],a:1},
      {q:'Identify the subject in: "The students passed the examination."',o:['passed','examination','students','the'],a:2},
      {q:'"She did not come, ___ she?" Choose the correct tag.',o:["didn't","did","does","doesn't"],a:1},
      {q:'Which word is correctly spelt?',o:['recieve','beleive','achieve','freind'],a:2},
      {q:'The sentence "Open the door!" is:',o:['declarative','interrogative','imperative','exclamatory'],a:2},
      {q:'A word that replaces a noun is called a(n):',o:['adjective','adverb','pronoun','conjunction'],a:2},
      {q:'Choose the correct form: "Neither of the girls ___ late."',o:['were','are','is','have'],a:2},
      {q:'The opposite of "generous" is:',o:['kind','stingy','giving','noble'],a:1},
      {q:'Which of the following is a common noun?',o:['Accra','Kofi','city','Monday'],a:2},
      {q:'"Do not use your phone here." This sentence is:',o:['declarative','imperative','interrogative','exclamatory'],a:1},
      {q:'Which word best completes the sentence: "The child was ___ tired to walk."',o:['very','too','so','more'],a:1},
      {q:'"He is taller ___ his brother." Choose the correct word.',o:['then','than','that','those'],a:1},
      {q:'A group of words that forms a complete thought is called a:',o:['phrase','clause','sentence','syllable'],a:2},
      {q:'Which tense is used in: "She has eaten her food"?',o:['simple past','present perfect','simple present','past perfect'],a:1},
      {q:'Select the correctly punctuated sentence:',o:["Let's go to the market.","Lets go to the market.","Let us, go to the market.","Lets' go to the market."],a:0},
      {q:'The word "slowly" is derived from the adjective:',o:['slow','slowing','slowed','slower'],a:0},
      {q:'Which sentence contains an error?',o:['He is my friend.','She are coming.','They went home.','We played football.'],a:1},
      {q:'"The cat sat on the mat." The word "on" is a:',o:['verb','noun','preposition','adjective'],a:2},
      {q:'Choose the correct pronoun: "___ and I went to school together."',o:['Him','Her','He','Them'],a:2},
      {q:'The word "unhappy" contains the prefix:',o:['un','hap','happy','py'],a:0},
      {q:'A word that describes a verb is called a(n):',o:['noun','adjective','pronoun','adverb'],a:3},
      {q:'Which of the following sentences is exclamatory?',o:['Where are you going?','What a beautiful rainbow!','She is reading.','Come here.'],a:1},
      {q:'"The boys ___ playing football." Choose the correct form.',o:['is','am','are','was'],a:2},
      {q:'Which of these words is a homophone of "flower"?',o:['flour','flow','floor','fluor'],a:0},
      {q:'Identify the type of noun in the word "crowd":',o:['proper noun','collective noun','abstract noun','material noun'],a:1},
      {q:'"She ___ to school every day." Fill in with the correct form of "go".',o:['go','gone','goes','going'],a:2},
    ]},
    e2:{id:'e2',title:'English Language — Set B',desc:'40 questions · Comprehension & Usage',difficulty:'medium',subj:'English Language',qs:[
      {q:'Which of the following is an abstract noun?',o:['table','Kofi','courage','pen'],a:2},
      {q:'Choose the sentence with the correct use of apostrophe:',o:["The boy's bag is red.","The boys bag is red.","The boy\'s bag is red.","The boys' bag are red."],a:0},
      {q:'The word "ran" is in the ___ tense.',o:['present','future','past','perfect'],a:2},
      {q:'Which is the correct comparative form of "good"?',o:['gooder','most good','better','more good'],a:2},
      {q:'A metaphor is a figure of speech that:',o:['exaggerates things','compares using "like" or "as"','makes a direct comparison without "like"','gives human qualities to objects'],a:2},

let state={};

function init(){
  const grid=document.getElementById('subject-grid');
  grid.innerHTML=DATA.subjects.map(s=>`
    <div class="subject-card ${s.cls}" onclick="selectSubject('${s.id}')">
      <div class="subj-icon">${s.icon}</div>
      <h3>${s.name}</h3>
      <p>${s.desc}</p>
      <span class="quiz-count-badge">${s.quizzes.length} quizzes · 40 Qs each</span>
    </div>`).join('');
}

function selectSubject(id){
  state.subject=DATA.subjects.find(s=>s.id===id);
  const qids=state.subject.quizzes;
  document.getElementById('ql-heading').textContent=state.subject.name;
  document.getElementById('ql-sub').textContent=`BECE-Style Objective Questions · ${state.subject.icon}`;
  document.getElementById('quiz-list').innerHTML=qids.map(qid=>{
    const q=DATA.quizzes[qid];
    return `<div class="quiz-item" onclick="startQuiz('${qid}')">
      <div class="qi-info"><h4>${q.title}</h4><p>${q.desc}</p></div>
      <div style="display:flex;align-items:center;gap:8px"><span class="badge badge-${q.difficulty}">${q.difficulty}</span><span class="arrow-ic">›</span></div>
    </div>`;
  }).join('');
  showScreen('quizlist');
}

function startQuiz(qid){
  state.quiz=DATA.quizzes[qid];
  state.questions=state.quiz.qs;
  state.currentQ=0;state.score=0;
  state.answers=Array(state.questions.length).fill(null);
  document.getElementById('q-subj-tag').textContent=state.quiz.subj;
  showScreen('quiz');renderQ();
}

function renderQ(){
  clearTimer();
  const q=state.questions[state.currentQ];
  const tot=state.questions.length;
  const idx=state.currentQ;
  document.getElementById('q-counter').textContent=`Question ${idx+1} of ${tot}`;
  document.getElementById('q-num-label').textContent=`QUESTION ${idx+1}`;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('progress-fill').style.width=`${(idx/tot)*100}%`;
  document.getElementById('live-score').textContent=state.score;
  const L=['A','B','C','D'];
  document.getElementById('options-grid').innerHTML=q.o.map((o,i)=>
    `<button class="option-btn" id="opt-${i}" onclick="selectAns(${i})"><span class="option-letter">${L[i]}</span><span>${o}</span></button>`
  ).join('');
  const fb=document.getElementById('feedback-msg');fb.style.display='none';fb.className='fb';
  document.getElementById('next-btn').disabled=true;
  state.answered=false;
  startTimer();
}

function selectAns(idx){
  if(state.answered)return;
  state.answered=true;clearTimer();
  const q=state.questions[state.currentQ];
  state.answers[state.currentQ]=idx;
  document.querySelectorAll('.option-btn').forEach((btn,i)=>{
    btn.disabled=true;
    if(i===q.a)btn.classList.add('correct');
    if(i===idx&&idx!==q.a)btn.classList.add('wrong');
  });
  const fb=document.getElementById('feedback-msg');
  if(idx===q.a){state.score++;document.getElementById('live-score').textContent=state.score;fb.textContent='✓ Correct!';fb.className='fb correct';}
  else{fb.textContent=`✗ Wrong! Correct answer: ${['A','B','C','D'][q.a]}`;fb.className='fb wrong';}
  fb.style.display='inline-flex';
  document.getElementById('next-btn').disabled=false;
}

function nextQuestion(){
  state.currentQ++;
  if(state.currentQ>=state.questions.length)showResults();
  else renderQ();
}

function startTimer(){
  const ring=document.getElementById('timer-ring');
  const num=document.getElementById('timer-num');
  let t=TMAX;
  ring.style.strokeDasharray=CIRC;ring.style.stroke='#1a56db';ring.style.strokeDashoffset=0;
  num.textContent=t;num.style.color=getComputedStyle(document.documentElement).getPropertyValue('--text');
  state.timerInt=setInterval(()=>{
    t--;num.textContent=t;
    ring.style.strokeDashoffset=CIRC*(1-t/TMAX);
    if(t<=10){ring.style.stroke='#dc2626';num.style.color='#dc2626';}
    else if(t<=20){ring.style.stroke='#f59e0b';num.style.color='#b45309';}
    if(t<=0){clearInterval(state.timerInt);timeOut();}
  },1000);
}
function clearTimer(){if(state.timerInt)clearInterval(state.timerInt);}
function timeOut(){
  if(state.answered)return;
  state.answered=true;state.answers[state.currentQ]=-1;
  const q=state.questions[state.currentQ];
  document.querySelectorAll('.option-btn').forEach((btn,i)=>{btn.disabled=true;if(i===q.a)btn.classList.add('correct');});
  const fb=document.getElementById('feedback-msg');
  fb.textContent=`⏰ Time up! Correct: ${['A','B','C','D'][q.a]}`;fb.className='fb timeout';fb.style.display='inline-flex';
  document.getElementById('next-btn').disabled=false;
}

function showResults(){
  clearTimer();
  const tot=state.questions.length;
  const cor=state.answers.filter((a,i)=>a===state.questions[i].a).length;
  const skip=state.answers.filter(a=>a===-1).length;
  const wrong=tot-cor-skip;
  const pct=Math.round((cor/tot)*100);
  document.getElementById('stat-correct').textContent=cor;
  document.getElementById('stat-wrong').textContent=wrong;
  document.getElementById('stat-skip').textContent=skip;
  document.getElementById('result-pct').textContent=pct+'%';
  let title,sub;
  if(pct>=80){title='🏆 Excellent!';sub='Outstanding performance! You are well prepared for BECE.';}
  else if(pct>=60){title='🎉 Good Work!';sub='Good effort. Keep revising your notes.';}
  else if(pct>=40){title='📖 Keep Studying!';sub='Review your answers below and try again.';}
  else{title='💪 Try Again!';sub='Study the syllabus carefully and retry.';}
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-sub').textContent=sub;
  const col=pct>=70?'#0a7c4b':pct>=50?'#f59e0b':'#dc2626';
  const ring=document.getElementById('result-ring');ring.style.stroke=col;
  document.getElementById('review-section').style.display='none';
  showScreen('results');
  setTimeout(()=>{ring.style.strokeDashoffset=345.4*(1-pct/100);},120);
}

function toggleReview(){
  const sec=document.getElementById('review-section');
  if(sec.style.display!=='none'){sec.style.display='none';return;}
  sec.style.display='block';
  const L=['A','B','C','D'];
  document.getElementById('review-list').innerHTML=state.questions.map((q,i)=>{
    const ua=state.answers[i];const isC=ua===q.a;const isS=ua===-1;
    const cls=isC?'cq':isS?'sq':'wq';
    const badge=isC?'<span class="rev-badge rb-c">✓ Correct</span>':isS?'<span class="rev-badge rb-s">⏰ Timed Out</span>':'<span class="rev-badge rb-w">✗ Wrong</span>';
    let ans=`<div class="rev-ans">Correct answer: <span class="ca">${L[q.a]}. ${q.o[q.a]}</span>`;
    if(!isC&&!isS)ans+=` &nbsp;|&nbsp; Your answer: <span class="wa">${L[ua]}. ${q.o[ua]}</span>`;
    ans+='</div>';
    return `<div class="rev-item ${cls}"><div class="rev-header"><span class="rev-q">${i+1}. ${q.q}</span>${badge}</div>${ans}</div>`;
  }).join('');
  sec.scrollIntoView({behavior:'smooth',block:'start'});
}

function retryQuiz(){document.getElementById('review-section').style.display='none';startQuiz(state.quiz.id);}
function goHome(){clearTimer();showScreen('subjects');}
function goBack(to){clearTimer();showScreen(to);}
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
init();
</script>
</body>
</html>
