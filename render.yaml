services:
  - type: web
    name: fastbrain-quiz
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fastbrain-quiz-db
          property: connectionString

databases:
  - name: fastbrain-quiz-db
    databaseName: quizmaster
    plan: free
